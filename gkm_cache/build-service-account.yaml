apiVersion: v1
kind: ServiceAccount
metadata:
  name: buildah-sa
# Link your registry push secret to this SA before running the pipeline:
#   1. Create the secret:
#      oc create secret docker-registry registry-push-secret \
#        --docker-server=quay.io \
#        --docker-username=<user> \
#        --docker-password=<token>
#   2. Link it to the SA:
#      oc secrets link buildah-sa registry-push-secret --for=mount
secrets:
  - name: registry-push-secret
imagePullSecrets:
  - name: docker-registry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: buildbot-scc
rules:
  - apiGroups:
      - security.openshift.io
    resourceNames:
      - privileged
    resources:
      - securitycontextconstraints
    verbs:
      - use
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: buildbot-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: buildbot-scc
subjects:
  - kind: ServiceAccount
    name: buildah-sa
---
# ClusterRole for pre-flight checks.
# Required by the isvc-cache-collector task to verify that ODH/RHOAI
# operators are installed and KServe CRDs are available.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: isvc-cache-preflight
rules:
  - apiGroups:
      - operators.coreos.com
    resources:
      - clusterserviceversions
    verbs:
      - get
      - list
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
  - apiGroups:
      - template.openshift.io
    resources:
      - templates
      - processedtemplates
    verbs:
      - get
      - list
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: isvc-cache-preflight
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: isvc-cache-preflight
subjects:
  - kind: ServiceAccount
    name: buildah-sa
    namespace: test-gkm-builder  # <-- Update this to your namespace before applying
---
# Role for ISVC-based cache collection.
# Required by the isvc-cache-collector task to deploy InferenceServices,
# manage PVCs, and extract cache artifacts from predictor pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: isvc-cache-collector
rules:
  - apiGroups:
      - serving.kserve.io
    resources:
      - inferenceservices
    verbs:
      - get
      - list
      - create
      - delete
      - watch
  - apiGroups:
      - serving.kserve.io
    resources:
      - servingruntimes
    verbs:
      - get
      - list
      - create
      - update
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - create
      - delete
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/exec
      - pods/log
    verbs:
      - get
      - list
      - watch
      - create
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: isvc-cache-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: isvc-cache-collector
subjects:
  - kind: ServiceAccount
    name: buildah-sa
---
# Role for managing GKMCache CRs and reading PVCs.
# Required by the gkm-cache-provisioner task.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gkm-cache-manager
rules:
  - apiGroups:
      - gkm.io
    resources:
      - gkmcaches
    verbs:
      - get
      - list
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gkm-cache-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gkm-cache-manager
subjects:
  - kind: ServiceAccount
    name: buildah-sa
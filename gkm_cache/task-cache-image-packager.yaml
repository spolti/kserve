apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cache-image-packager
  labels:
    app: gkm-cache-builder
    task-type: packaging
spec:
  description: "Packages vLLM cache as OCI image using GKM MCV (Model Cache Vault)"

  params:
  - name: model-name
    type: string
  - name: model-name-clean
    type: string
    description: "Label-safe model name (lowercase, no slashes, max 63 chars)"
  - name: model-revision
    type: string
  - name: target-gpu-arch
    type: string
  - name: registry-url
    type: string
  - name: cache-tag
    type: string
    default: ""
  - name: gpu-compute-cap
    type: string
    description: "GPU compute capability from environment detection"
  - name: registry-secret
    type: string
    default: "registry-push-secret"
    description: "Name of the Kubernetes docker-registry secret for pushing cache images"
  - name: mcv-image
    type: string
    default: "quay.io/gkm/mcv:latest"
    description: "OCI image containing the mcv binary"
  - name: cosign-secret
    type: string
    default: "cosign-signing-key"
    description: "Name of the Kubernetes secret containing a cosign private key (cosign.key + cosign.password). If the secret does not exist, keyless signing via Sigstore is used."

  workspaces:
  - name: cache
    description: "Cache workspace containing artifacts to package"

  volumes:
  - name: container-storage
    emptyDir: {}
  - name: registry-auth
    secret:
      secretName: "$(params.registry-secret)"
      optional: false
  - name: cosign-key
    secret:
      secretName: "$(params.cosign-secret)"
      optional: true

  steps:
  - name: verify-registry-secret
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    script: |
      #!/bin/bash
      set -e

      REGISTRY_URL="$(params.registry-url)"
      SECRET_NAME="$(params.registry-secret)"

      echo "=== Verifying Registry Push Secret ==="
      echo "Registry: $REGISTRY_URL"
      echo "Secret: $SECRET_NAME"

      # Check the secret exists and has the expected key
      if ! oc get secret "$SECRET_NAME" > /dev/null 2>&1; then
        echo "ERROR: Secret '$SECRET_NAME' not found in the current namespace."
        echo ""
        echo "Create the secret with:"
        echo "  oc create secret docker-registry $SECRET_NAME \\"
        echo "    --docker-server=$REGISTRY_URL \\"
        echo "    --docker-username=<username> \\"
        echo "    --docker-password=<token>"
        echo ""
        echo "Then link it to the service account:"
        echo "  oc secrets link buildah-sa $SECRET_NAME --for=mount"
        exit 1
      fi

      # Verify the secret contains auth data
      SECRET_TYPE=$(oc get secret "$SECRET_NAME" -o jsonpath='{.type}')
      echo "Secret type: $SECRET_TYPE"

      if [ "$SECRET_TYPE" != "kubernetes.io/dockerconfigjson" ] && [ "$SECRET_TYPE" != "kubernetes.io/dockercfg" ]; then
        echo "WARNING: Secret '$SECRET_NAME' is type '$SECRET_TYPE', expected 'kubernetes.io/dockerconfigjson'."
        echo "The push may fail if the secret does not contain valid registry credentials."
      fi

      # Ensure the secret is linked to the pipeline service account
      oc secrets link buildah-sa "$SECRET_NAME" --for=mount 2>/dev/null || echo "Warning: could not link secret to buildah-sa (may require elevated permissions)"

      echo "Registry push secret verified"

  - name: build-and-push
    image: registry.redhat.io/rhel9/buildah:latest
    workingDir: /workspace
    securityContext:
      privileged: true
    env:
    - name: STORAGE_DRIVER
      value: vfs
    - name: BUILDAH_ISOLATION
      value: chroot
    volumeMounts:
    - name: container-storage
      mountPath: /var/lib/containers
    - name: registry-auth
      mountPath: /etc/registry-auth
      readOnly: true
    - name: cosign-key
      mountPath: /etc/cosign-key
      readOnly: true
    script: |
      #!/bin/bash
      set -e

      echo "=== Building vLLM Cache Image with MCV ==="

      # Set up buildah auth from the mounted registry secret
      AUTH_FILE=""
      if [ -f /etc/registry-auth/.dockerconfigjson ]; then
        AUTH_FILE="/etc/registry-auth/.dockerconfigjson"
      elif [ -f /etc/registry-auth/.dockercfg ]; then
        AUTH_FILE="/etc/registry-auth/.dockercfg"
      fi
      if [ -n "$AUTH_FILE" ]; then
        echo "Using registry credentials from secret"
        export REGISTRY_AUTH_FILE="$AUTH_FILE"
      else
        echo "WARNING: No .dockerconfigjson or .dockercfg found in registry secret"
      fi

      # Extract parameters
      MODEL_NAME="$(params.model-name)"
      MODEL_NAME_CLEAN="$(params.model-name-clean)"
      MODEL_REVISION="$(params.model-revision)"
      TARGET_GPU_ARCH="$(params.target-gpu-arch)"
      REGISTRY_URL="$(params.registry-url)"

      # Generate clean tag using model-name-clean
      if [ -n "$(params.cache-tag)" ] && [ "$(params.cache-tag)" != "" ]; then
        IMAGE_TAG="$(params.cache-tag)"
      else
        IMAGE_TAG="${MODEL_NAME_CLEAN}-${TARGET_GPU_ARCH}"
      fi
      IMAGE_TAG=$(echo "${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | sed 's/--*/-/g')
      FULL_IMAGE_URL="${REGISTRY_URL}/gkm_cache_container:${IMAGE_TAG}"

      echo "Target image: ${FULL_IMAGE_URL}"

      # ---------------------------------------------------------------
      # Step 1: Extract MCV binary from its container image
      # ---------------------------------------------------------------
      echo "=== Extracting MCV binary ==="
      MCV_IMAGE="$(params.mcv-image)"
      echo "MCV image: $MCV_IMAGE"

      MCV_CONTAINER=$(buildah --storage-driver=vfs from "$MCV_IMAGE" 2>/dev/null || echo "")
      if [ -z "$MCV_CONTAINER" ]; then
        echo "ERROR: Failed to pull MCV image: $MCV_IMAGE"
        echo "Ensure the image exists and is accessible."
        exit 1
      fi

      MCV_MOUNT=$(buildah --storage-driver=vfs mount "$MCV_CONTAINER")
      MCV_BIN=""
      for candidate in "$MCV_MOUNT/usr/local/bin/mcv" "$MCV_MOUNT/usr/bin/mcv" "$MCV_MOUNT/mcv"; do
        if [ -f "$candidate" ]; then
          MCV_BIN="$candidate"
          break
        fi
      done

      if [ -z "$MCV_BIN" ]; then
        echo "ERROR: mcv binary not found in image $MCV_IMAGE"
        echo "Searched: /usr/local/bin/mcv, /usr/bin/mcv, /mcv"
        echo "Contents of image root:"
        ls -la "$MCV_MOUNT/" || true
        buildah --storage-driver=vfs umount "$MCV_CONTAINER" 2>/dev/null || true
        buildah --storage-driver=vfs rm "$MCV_CONTAINER" 2>/dev/null || true
        exit 1
      fi

      cp "$MCV_BIN" /usr/local/bin/mcv
      chmod +x /usr/local/bin/mcv
      buildah --storage-driver=vfs umount "$MCV_CONTAINER" 2>/dev/null || true
      buildah --storage-driver=vfs rm "$MCV_CONTAINER" 2>/dev/null || true
      echo "MCV binary installed"
      mcv --help 2>/dev/null | head -5 || echo "mcv binary ready"

      # ---------------------------------------------------------------
      # Step 2: Prepare cache directory for MCV
      # ---------------------------------------------------------------
      # MCV expects the cache in its natural vLLM layout including
      # torch_compile_cache/{hash}/rank_X_Y/ structure.
      echo "=== Preparing Cache Directory ==="
      CACHE_SRC="/workspace/cache/vllm_cache/torch_compile_cache"
      if [ ! -d "$CACHE_SRC" ]; then
        echo "ERROR: Cache directory not found at $CACHE_SRC"
        exit 1
      fi

      # MCV auto-detects vLLM cache by looking for torch_compile_cache/
      # subdirectory inside the provided --dir path.
      # Preserve the torch_compile_cache directory name for MCV detection.
      MCV_CACHE_DIR="/workspace/mcv-cache"
      mkdir -p "$MCV_CACHE_DIR/torch_compile_cache"
      cp -r "$CACHE_SRC"/* "$MCV_CACHE_DIR/torch_compile_cache/" 2>/dev/null || true
      # Remove filesystem artifacts and metadata files that are not part of the cache
      rm -rf "$MCV_CACHE_DIR/torch_compile_cache/lost+found"
      for f in $(ls "$MCV_CACHE_DIR/torch_compile_cache"/*.json 2>/dev/null); do rm -f "$f"; done

      echo "Cache directory contents for MCV:"
      find "$MCV_CACHE_DIR" -maxdepth 3 -type d | sort
      echo "---"

      # ---------------------------------------------------------------
      # Step 3: Create OCI image with MCV
      # ---------------------------------------------------------------
      echo "=== Creating OCI Image with MCV ==="
      mcv --create \
        --image "${FULL_IMAGE_URL}" \
        --dir "$MCV_CACHE_DIR" \
        --no-gpu \
        --builder buildah \
        --log-level info

      echo "MCV created image: ${FULL_IMAGE_URL}"

      # ---------------------------------------------------------------
      # Step 4: Add io.kserve.gkm/* labels
      # ---------------------------------------------------------------
      # MCV auto-generates cache.vllm.image/* labels from the cache.
      # Add the io.kserve.gkm/* labels on top for KServe/GKM integration.
      echo "=== Adding io.kserve.gkm Labels ==="

      VLLM_STARTUP_SECONDS=$(cat /workspace/cache/vllm-startup-seconds.txt 2>/dev/null || echo "0")
      VLLM_VERSION=$(cat /workspace/cache/vllm-version.txt 2>/dev/null || echo "unknown")
      MODEL_ARCH=$(cat /workspace/cache/model-architecture.txt 2>/dev/null || echo "unknown")
      CACHE_SIZE_BYTES=$(cat /workspace/cache/cache-size-bytes.txt 2>/dev/null || echo "0")
      CACHE_ENTRY_COUNT=$(cat /workspace/cache/cache-files-count.txt 2>/dev/null || echo "0")
      BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      # Read GPU environment from detect-gpu-environment task (shared workspace)
      # Note: buildah image may not have python3, so use grep/sed to parse JSON
      GPU_ENV_FILE="/workspace/cache/gpu-environment.json"
      if [ -f "$GPU_ENV_FILE" ]; then
        GPU_PRODUCT=$(grep '"gpu_name"' "$GPU_ENV_FILE" | sed 's/.*: *"//;s/".*//' || echo "unknown")
        GPU_MEMORY_MB=$(grep '"gpu_memory_mb"' "$GPU_ENV_FILE" | sed 's/.*: *//;s/[, ].*//' || echo "")
        CUDA_VERSION=$(grep '"cuda_version"' "$GPU_ENV_FILE" | sed 's/.*: *"//;s/".*//' || echo "")
        DRIVER_VERSION=$(grep '"driver_version"' "$GPU_ENV_FILE" | sed 's/.*: *"//;s/".*//' || echo "")
        echo "GPU environment loaded from $GPU_ENV_FILE"
        echo "  GPU: $GPU_PRODUCT, Memory: ${GPU_MEMORY_MB}MB, CUDA: $CUDA_VERSION, Driver: $DRIVER_VERSION"
      else
        echo "WARNING: $GPU_ENV_FILE not found, GPU labels will be empty"
        GPU_PRODUCT="unknown"
        GPU_MEMORY_MB=""
        CUDA_VERSION=""
        DRIVER_VERSION=""
      fi

      # Get the local image created by MCV
      MCV_LOCAL_IMAGE=$(buildah --storage-driver=vfs images --format '{{.Name}}:{{.Tag}}' | grep "gkm_cache_container" | head -1 || echo "")
      if [ -z "$MCV_LOCAL_IMAGE" ]; then
        echo "WARNING: Could not find MCV-built image in local storage."
        echo "Attempting to use full URL: ${FULL_IMAGE_URL}"
        MCV_LOCAL_IMAGE="${FULL_IMAGE_URL}"
      fi

      # Use buildah config to add custom labels on top of MCV's auto-labels
      MCV_CONTAINER_ID=$(buildah --storage-driver=vfs from "$MCV_LOCAL_IMAGE" 2>/dev/null || echo "")
      if [ -n "$MCV_CONTAINER_ID" ]; then
        buildah --storage-driver=vfs config \
          --label "io.kserve.gkm/built-on=${BUILD_TIMESTAMP}" \
          --label "io.kserve.gkm/vllm-version=${VLLM_VERSION}" \
          --label "io.kserve.gkm/model-name=${MODEL_NAME_CLEAN}" \
          --label "io.kserve.gkm/model-architecture=${MODEL_ARCH}" \
          --label "io.kserve.gkm/compilation-level=3" \
          --label "io.kserve.gkm/cache-size-in-bytes=${CACHE_SIZE_BYTES}" \
          --label "io.kserve.gkm/entry-count=${CACHE_ENTRY_COUNT}" \
          --label "io.kserve.gkm/gpu-product=${GPU_PRODUCT}" \
          --label "io.kserve.gkm/gpu-memory-mb=${GPU_MEMORY_MB}" \
          --label "io.kserve.gkm/cuda-version=${CUDA_VERSION}" \
          --label "io.kserve.gkm/driver-version=${DRIVER_VERSION}" \
          --label "ai.vllm.cache.first-startup-seconds=${VLLM_STARTUP_SECONDS}" \
          --label "ai.vllm.cache.gpu-arch=${TARGET_GPU_ARCH}" \
          --label "ai.vllm.model.name=${MODEL_NAME}" \
          --label "ai.vllm.model.revision=${MODEL_REVISION}" \
          "$MCV_CONTAINER_ID"

        buildah --storage-driver=vfs commit --squash "$MCV_CONTAINER_ID" "${FULL_IMAGE_URL}"
        buildah --storage-driver=vfs rm "$MCV_CONTAINER_ID" 2>/dev/null || true
        echo "Custom labels added to image"
      else
        echo "WARNING: Could not add custom labels. MCV image will have auto-generated labels only."
      fi

      # ---------------------------------------------------------------
      # Step 5: Push image to registry
      # ---------------------------------------------------------------
      echo "=== Pushing Image ==="
      echo "Pushing: ${FULL_IMAGE_URL}..."
      PUSH_ARGS="--storage-driver=vfs"
      if [ -n "$AUTH_FILE" ]; then
        PUSH_ARGS="$PUSH_ARGS --authfile=$AUTH_FILE"
      fi
      buildah push $PUSH_ARGS \
        "${FULL_IMAGE_URL}" \
        "docker://${FULL_IMAGE_URL}"
      echo "Pushed: ${FULL_IMAGE_URL}"

      # Get digest
      IMAGE_DIGEST=$(buildah inspect --storage-driver=vfs --format '{{.FromImageDigest}}' "${FULL_IMAGE_URL}" 2>/dev/null || echo "unknown")

      echo "=== Image Summary ==="
      echo "Image: ${FULL_IMAGE_URL}"
      echo "Digest: ${IMAGE_DIGEST}"
      echo "Labels (io.kserve.gkm/*):"
      echo "  built-on:           ${BUILD_TIMESTAMP}"
      echo "  vllm-version:       ${VLLM_VERSION}"
      echo "  model-name:         ${MODEL_NAME_CLEAN}"
      echo "  model-architecture: ${MODEL_ARCH}"
      echo "  compilation-level:  3"
      echo "  cache-size-in-bytes: ${CACHE_SIZE_BYTES}"
      echo "  entry-count:        ${CACHE_ENTRY_COUNT}"
      echo "  gpu-product:        ${GPU_PRODUCT}"
      echo "  gpu-memory-mb:      ${GPU_MEMORY_MB}"
      echo "  cuda-version:       ${CUDA_VERSION}"
      echo "  driver-version:     ${DRIVER_VERSION}"

      # Save results
      echo -n "${IMAGE_TAG}" > $(results.image-tag.path)
      echo -n "${FULL_IMAGE_URL}" > $(results.full-image-url.path)
      echo -n "${IMAGE_DIGEST}" > $(results.image-digest.path)

      # ---------------------------------------------------------------
      # Step 6: Sign image with cosign (https://github.com/sigstore/cosign)
      # ---------------------------------------------------------------
      echo "=== Cosign Image Signing ==="

      # Download cosign binary from GitHub releases
      COSIGN_VERSION="v2.4.1"
      ARCH=$(uname -m)
      case "$ARCH" in
        x86_64)  COSIGN_ARCH="amd64" ;;
        aarch64) COSIGN_ARCH="arm64" ;;
        s390x)   COSIGN_ARCH="s390x" ;;
        ppc64le) COSIGN_ARCH="ppc64le" ;;
        *)       COSIGN_ARCH="amd64" ;;
      esac

      COSIGN_URL="https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-${COSIGN_ARCH}"
      echo "Downloading cosign ${COSIGN_VERSION} for ${COSIGN_ARCH}..."
      curl -sSL -o /usr/local/bin/cosign "$COSIGN_URL"
      chmod +x /usr/local/bin/cosign
      cosign version

      # Set up registry auth for cosign
      if [ -n "$AUTH_FILE" ]; then
        mkdir -p /tmp/.docker
        cp "$AUTH_FILE" /tmp/.docker/config.json
        export DOCKER_CONFIG="/tmp/.docker"
      fi

      # Build image reference for signing (prefer digest over tag)
      IMAGE_REF="${FULL_IMAGE_URL%:*}@${IMAGE_DIGEST}"
      if [ "${IMAGE_DIGEST}" = "unknown" ] || [ -z "${IMAGE_DIGEST}" ]; then
        echo "WARNING: Image digest not available, signing by tag"
        IMAGE_REF="${FULL_IMAGE_URL}"
      fi
      echo "Signing: ${IMAGE_REF}"

      # Determine signing mode based on whether the cosign key file exists
      # (the secret volume is optional; if the secret doesn't exist the mount is empty)
      COSIGN_KEY_FILE="/etc/cosign-key/cosign.key"
      COSIGN_PASSWORD_FILE="/etc/cosign-key/cosign.password"

      if [ -f "$COSIGN_KEY_FILE" ]; then
        echo "Mode: Key-based signing"
        if [ -f "$COSIGN_PASSWORD_FILE" ]; then
          export COSIGN_PASSWORD=$(cat "$COSIGN_PASSWORD_FILE")
        fi
        cosign sign --key "$COSIGN_KEY_FILE" --yes "${IMAGE_REF}"
        echo "Image signed successfully"

        echo "=== Verifying Signature ==="
        cosign verify --key "$COSIGN_KEY_FILE" "${IMAGE_REF}" 2>/dev/null && echo "Signature verified" || echo "WARNING: Signature verification failed"
      else
        echo "Mode: Keyless signing (Sigstore Fulcio + Rekor)"
        echo "No cosign key found at $COSIGN_KEY_FILE — using keyless mode"
        export COSIGN_EXPERIMENTAL=1
        cosign sign --yes "${IMAGE_REF}"
        echo "Image signed successfully"

        echo "=== Verifying Signature ==="
        cosign verify --certificate-identity-regexp='.*' --certificate-oidc-issuer-regexp='.*' "${IMAGE_REF}" 2>/dev/null && echo "Signature verified" || echo "WARNING: Keyless signature verification skipped (requires OIDC context)"
      fi

  results:
  - name: image-tag
    description: "Generated OCI-compliant image tag"
  - name: full-image-url
    description: "Complete image URL"
  - name: image-digest
    description: "SHA256 digest of the OCI image"